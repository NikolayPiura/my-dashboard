<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дашборд</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Unbounded:wght@400;700;800&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07070c;--s1:#0f0f18;--s2:#141420;--s3:#1a1a28;
  --b1:#2a2a40;--b2:#363650;--b3:#424260;
  --accent:#7c5cfc;--a2:#a78bfa;
  --text:#e8e8f4;--t2:#8888a8;--t3:#4a4a68;
  --work:#3b82f6;--health:#22c55e;--personal:#f59e0b;
  --focus:#ec4899;--study:#06b6d4;--sport:#f97316;
  --red:#ef4444;--green:#22c55e;
  --mono:'JetBrains Mono',monospace;
  --title:'Unbounded',sans-serif;
  --sans:'Golos Text',sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans)}

/* ══ NAV ══ */
.nav{display:flex;height:80px;background:var(--s1);border-bottom:2px solid var(--b1);align-items:stretch;padding:0 36px;flex-shrink:0}
.nav-btn{font-family:var(--mono);font-size:22px;letter-spacing:3px;color:var(--t2);padding:0 44px;border:none;background:transparent;cursor:pointer;border-bottom:4px solid transparent;margin-bottom:-2px;transition:all .2s;white-space:nowrap;display:flex;align-items:center}
.nav-btn:hover{color:var(--a2);background:rgba(167,139,250,.06)}
.nav-btn.active{color:var(--a2);border-bottom-color:var(--accent);background:rgba(167,139,250,.08)}
.nav-clock{font-family:var(--mono);font-size:38px;font-weight:700;letter-spacing:5px;color:var(--text);margin-left:auto;align-self:center}

/* ══ PAGES ══ */
.page{display:none;height:calc(100vh - 80px);overflow:hidden}
.page.active{display:grid}
#pg-today{grid-template-columns:1fr 1fr}
#pg-history{grid-template-columns:1fr}

/* ══ LEFT COL ══ */
.left-col{display:grid;grid-template-rows:auto 1fr auto;border-right:1px solid var(--b1);overflow:hidden}

/* Header */
.lh{background:var(--s1);border-bottom:1px solid var(--b1);padding:24px 28px 20px;display:flex;flex-direction:column;gap:16px}
.lh-date{font-family:var(--title);font-size:38px;font-weight:800;color:var(--text);line-height:1}
.lh-row{display:flex;align-items:center;gap:14px}
.lh-done{font-family:var(--title);font-size:26px;font-weight:800;color:var(--text)}
.lh-pct{font-family:var(--mono);font-size:26px;font-weight:700;color:var(--a2)}
.lh-bar{flex:1;height:10px;background:var(--b1);border-radius:5px;overflow:hidden}
.lh-bar-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--accent),var(--a2));transition:width .5s}
.lh-reset{font-family:var(--mono);font-size:12px;background:transparent;border:1px solid var(--b2);color:var(--t2);padding:7px 16px;border-radius:7px;cursor:pointer;letter-spacing:.5px;flex-shrink:0;transition:all .2s}
.lh-reset:hover{border-color:var(--accent);color:var(--a2)}
.lh-cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.lh-card{background:var(--s3);border:1px solid var(--b1);border-radius:14px;padding:20px 16px;text-align:center}
.lh-card-val{font-family:var(--title);font-size:52px;font-weight:800;line-height:1;margin-bottom:6px}
.lh-card-lbl{font-size:12px;color:var(--t2);letter-spacing:1px;font-family:var(--mono)}
.lh-card.g .lh-card-val{color:var(--green)}
.lh-card.b .lh-card-val{color:var(--work)}
.lh-card.r .lh-card-val{color:var(--red)}

/* Tasks */
.tasks-scroll{overflow-y:auto;overflow-x:hidden;padding:10px 14px;scrollbar-width:thin;scrollbar-color:var(--b2) transparent}
.tasks-scroll::-webkit-scrollbar{width:4px}
.tasks-scroll::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

.task-card{display:flex;align-items:center;gap:12px;background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:13px 14px;margin-bottom:6px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.task-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px}
.task-card.cat-work::before{background:var(--work)}
.task-card.cat-health::before{background:var(--health)}
.task-card.cat-personal::before{background:var(--personal)}
.task-card.cat-focus::before{background:var(--focus)}
.task-card.cat-study::before{background:var(--study)}
.task-card.cat-sport::before{background:var(--sport)}
.task-card:hover{border-color:var(--b2);background:var(--s3);transform:translateX(3px)}
.task-card.done{opacity:.32}
.task-card.done .tname{text-decoration:line-through;color:var(--t3)}
.task-card.current-task{border-color:var(--accent)}
.task-card.missed:not(.done){border-color:#ef444430}
.cb{width:20px;height:20px;border-radius:5px;border:2px solid var(--b3);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.cb.on{background:var(--accent);border-color:var(--accent)}
.cb.on::after{content:'✓';font-size:12px;color:#fff;font-weight:700}
.ttime{font-family:var(--mono);font-size:12px;color:var(--t3);flex-shrink:0;min-width:40px}
.tname{font-size:14px;flex:1;line-height:1.3;font-weight:500}
.tdur{font-size:11px;color:var(--t3);font-family:var(--mono);flex-shrink:0}
.ttag{font-size:11px;padding:3px 8px;border-radius:5px;font-weight:600;flex-shrink:0}
.tag-work{background:#1a3050;color:#60a5fa}
.tag-health{background:#0f3020;color:#4ade80}
.tag-personal{background:#382008;color:#fbbf24}
.tag-focus{background:#400a25;color:#f9a8d4}
.tag-study{background:#052535;color:#67e8f9}
.tag-sport{background:#38200a;color:#fb923c}

.now-bar{display:flex;align-items:center;gap:10px;margin:6px 0;padding:7px 14px;background:#ef444412;border:1px solid #ef444440;border-radius:8px}
.now-dot{width:11px;height:11px;border-radius:50%;background:var(--red);box-shadow:0 0 10px var(--red);flex-shrink:0;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.now-t{font-family:var(--mono);font-size:13px;color:var(--red);font-weight:700}
.now-sep{font-size:12px;color:var(--t3)}

/* Bottom extras: streak + quote */
.lh-extras{background:var(--s1);border-top:1px solid var(--b1);padding:16px 28px;display:grid;grid-template-columns:auto 1fr;gap:18px;align-items:center}
.streak-box{background:var(--s3);border:1px solid var(--b1);border-radius:14px;padding:14px 22px;text-align:center;flex-shrink:0}
.streak-fire{font-size:22px;line-height:1;margin-bottom:2px}
.streak-n{font-family:var(--title);font-size:40px;font-weight:800;color:#f97316;line-height:1}
.streak-lbl{font-size:10px;color:var(--t2);font-family:var(--mono);letter-spacing:.5px;margin-top:3px}
.quote-box{background:var(--s3);border:1px solid var(--b1);border-left:4px solid var(--accent);border-radius:0 14px 14px 0;padding:16px 20px}
.quote-text{font-size:14px;color:var(--text);line-height:1.6;font-style:italic}
.quote-author{font-size:11px;color:var(--t3);margin-top:8px;font-family:var(--mono)}

/* ══ RIGHT COL ══ */
.right-col{display:flex;flex-direction:column;overflow:hidden;background:var(--s1)}

.rb{padding:22px 26px;border-bottom:1px solid var(--b1);flex-shrink:0}
.rb-title{font-family:var(--mono);font-size:11px;letter-spacing:2px;color:var(--t3);text-transform:uppercase;margin-bottom:14px}

/* Progress bars */
.prog-item{margin-bottom:14px}
.prog-item:last-child{margin-bottom:0}
.prog-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.prog-name{font-size:15px;color:var(--t2);font-weight:500}
.prog-val{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--a2)}
.prog-bg{background:var(--s3);border-radius:8px;overflow:hidden}
.prog-fill{border-radius:8px;transition:width .6s cubic-bezier(.4,0,.2,1)}

/* Cat bars */
.cat-row{display:flex;align-items:center;gap:12px;margin-bottom:13px}
.cat-row:last-child{margin-bottom:0}
.cat-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.cat-name{font-size:14px;color:var(--t2);width:76px;flex-shrink:0;font-weight:500}
.cat-bg{flex:1;background:var(--s3);border-radius:6px;height:10px;overflow:hidden}
.cat-fill{height:100%;border-radius:6px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.cat-meta{font-family:var(--mono);font-size:12px;color:var(--t3);width:70px;text-align:right;flex-shrink:0}

/* Doughnut */
.chart-wrap{position:relative;width:180px;height:180px;margin:0 auto}
.chart-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
.chart-pct{font-family:var(--title);font-size:34px;font-weight:800;color:var(--a2)}
.chart-sub{font-size:11px;color:var(--t3);letter-spacing:1px;margin-top:3px;font-family:var(--mono)}
.chart-legend{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px}
.leg-item{display:flex;align-items:center;justify-content:space-between;font-size:13px;color:var(--t2);background:var(--s3);border:1px solid var(--b1);border-radius:8px;padding:8px 12px}
.leg-left{display:flex;align-items:center;gap:8px}
.leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.leg-val{font-family:var(--mono);font-size:12px;color:var(--a2);font-weight:700}

/* Mini stats */
.mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mini-card{background:var(--s3);border:1px solid var(--b1);border-radius:12px;padding:18px}
.mini-val{font-family:var(--title);font-size:30px;font-weight:700;color:var(--a2);margin-bottom:5px}
.mini-lbl{font-size:11px;color:var(--t3);font-family:var(--mono);letter-spacing:.5px}

/* Activity bars */
.act-bars{display:flex;align-items:flex-end;gap:6px;height:70px;margin-top:10px}
.act-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px}
.act-bar{width:100%;border-radius:5px 5px 0 0;min-height:4px;transition:height .4s}
.act-lbl{font-size:10px;color:var(--t3);font-family:var(--mono)}

/* Countdown */
.cd-wrap{display:flex;align-items:center;justify-content:space-between}
.cd-left{display:flex;flex-direction:column;gap:4px}
.cd-val{font-family:var(--mono);font-size:32px;font-weight:700;color:var(--a2)}
.cd-lbl{font-size:12px;color:var(--t3);font-family:var(--mono);letter-spacing:.5px}
.cd-ring{position:relative;width:70px;height:70px;flex-shrink:0}
.cd-ring svg{transform:rotate(-90deg)}
.cd-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;font-weight:700;color:var(--a2)}

/* HISTORY */
.hist-body{padding:28px 32px;overflow-y:auto;height:100%;scrollbar-width:thin;scrollbar-color:var(--b2) transparent}
.hist-body::-webkit-scrollbar{width:4px}
.hist-body::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
.hist-title{font-family:var(--title);font-size:24px;font-weight:800;margin-bottom:8px}
.hist-sub{font-size:14px;color:var(--t2);margin-bottom:28px}
.hist-days{display:flex;flex-direction:column;gap:16px}
.hist-day{background:var(--s2);border:1px solid var(--b1);border-radius:14px;overflow:hidden}
.hist-day-hdr{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background .2s}
.hist-day-hdr:hover{background:var(--s3)}
.hist-day-date{font-family:var(--title);font-size:14px;font-weight:700}
.hist-day-meta{display:flex;align-items:center;gap:14px}
.hist-day-pct{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--a2)}
.hist-day-bar{width:130px;height:6px;background:var(--b1);border-radius:3px;overflow:hidden}
.hist-day-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--a2));transition:width .4s}
.hist-tasks{padding:0 20px 16px;display:none;border-top:1px solid var(--b1)}
.hist-tasks.open{display:block}
.hist-task-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #2a2a4022}
.hist-task-row:last-child{border-bottom:none}
.hist-task-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.hist-task-name{font-size:13px;flex:1;color:var(--t2)}
.hist-task-done{font-family:var(--mono);font-size:10px;padding:2px 6px;border-radius:4px}
.hd-yes{background:#22c55e20;color:#4ade80}
.hd-no{background:#ef444420;color:#f87171}
.no-hist{text-align:center;padding:80px 20px;color:var(--t3);font-size:14px}
.no-hist-ico{font-size:56px;margin-bottom:16px}

/* CONFETTI */
.conf-layer{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.cp{position:absolute;border-radius:2px;animation:cpfall linear forwards}
@keyframes cpfall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>

<div class="nav">
  <button class="nav-btn active" onclick="showPage('today',this)">СЕГОДНЯ</button>
  <button class="nav-btn" onclick="showPage('history',this)">ИСТОРИЯ</button>
  <div class="nav-clock" id="clock">00:00:00</div>
</div>

<!-- TODAY -->
<div class="page active" id="pg-today">
  <div class="left-col">
    <div class="lh">
      <div class="lh-date" id="lh-date">суббота, 28 марта</div>
      <div class="lh-row">
        <span class="lh-done" id="lh-done-txt">выполнено 0 из 29</span>
        <div class="lh-bar"><div class="lh-bar-fill" id="lh-bar" style="width:0%"></div></div>
        <span class="lh-pct" id="lh-pct">0%</span>
        <button class="lh-reset" onclick="resetDay()">СБРОС</button>
      </div>
      <div class="lh-cards">
        <div class="lh-card g"><div class="lh-card-val" id="card-done">0</div><div class="lh-card-lbl">ГОТОВО</div></div>
        <div class="lh-card b"><div class="lh-card-val" id="card-rem">0</div><div class="lh-card-lbl">ОСТАЛОСЬ</div></div>
        <div class="lh-card r"><div class="lh-card-val" id="card-miss">0</div><div class="lh-card-lbl">ПРОПУЩЕНО</div></div>
      </div>
    </div>
    <div class="tasks-scroll" id="tasks-scroll"></div>
    <div class="lh-extras">
      <div class="streak-box">
        <div class="streak-fire">🔥</div>
        <div class="streak-n" id="streak-n">0</div>
        <div class="streak-lbl">ДНЕЙ ПОДРЯД</div>
      </div>
      <div class="quote-box">
        <div class="quote-text" id="quote-text">Дисциплина — это мост между целями и достижениями.</div>
        <div class="quote-author" id="quote-author">— Джим Рон</div>
      </div>
    </div>
  </div>

  <div class="right-col" id="right-col"></div>
</div>

<!-- HISTORY -->
<div class="page" id="pg-history">
  <div class="hist-body" id="hist-body">
    <div class="hist-title">История дней</div>
    <div class="hist-sub">Архив выполнения задач по дням</div>
    <div class="hist-days" id="hist-days"></div>
  </div>
</div>

<div class="conf-layer" id="confetti"></div>

<script>
const TASK_SAVE='dash_v5';
const HIST_SAVE='dash_hist_v1';

const INIT_TASKS=[
  {id:1,time:'06:30',name:'Подъём и стакан воды',cat:'health',dur:10},
  {id:2,time:'06:45',name:'Утренняя зарядка',cat:'sport',dur:15},
  {id:3,time:'07:00',name:'Контрастный душ',cat:'health',dur:10},
  {id:4,time:'07:15',name:'Завтрак',cat:'personal',dur:20},
  {id:5,time:'07:40',name:'Чтение новостей',cat:'study',dur:20},
  {id:6,time:'08:00',name:'Пробежка 30 минут',cat:'sport',dur:30},
  {id:7,time:'08:35',name:'Планирование дня',cat:'focus',dur:15},
  {id:8,time:'09:00',name:'Проверить почту',cat:'work',dur:20},
  {id:9,time:'09:30',name:'Обработка задач из почты',cat:'work',dur:30},
  {id:10,time:'10:00',name:'Встреча с командой',cat:'work',dur:60},
  {id:11,time:'11:00',name:'Deep work — основной проект',cat:'focus',dur:90},
  {id:12,time:'12:30',name:'Обед',cat:'personal',dur:30},
  {id:13,time:'13:00',name:'Код-ревью',cat:'work',dur:45},
  {id:14,time:'13:50',name:'Ответы на Slack',cat:'work',dur:20},
  {id:15,time:'14:00',name:'Звонок с клиентом',cat:'work',dur:45},
  {id:16,time:'15:00',name:'Изучить новую библиотеку',cat:'study',dur:60},
  {id:17,time:'15:30',name:'Написать отчёт',cat:'work',dur:60},
  {id:18,time:'16:30',name:'Прогулка / разгрузка',cat:'health',dur:30},
  {id:19,time:'17:00',name:'Блок фокусной работы',cat:'focus',dur:90},
  {id:20,time:'18:00',name:'Чтение — 30 минут',cat:'study',dur:30},
  {id:21,time:'18:30',name:'Приготовить ужин',cat:'personal',dur:30},
  {id:22,time:'19:00',name:'Ужин',cat:'personal',dur:30},
  {id:23,time:'19:30',name:'Онлайн-курс / лекция',cat:'study',dur:60},
  {id:24,time:'20:00',name:'Спортзал',cat:'sport',dur:60},
  {id:25,time:'21:00',name:'Медитация',cat:'health',dur:20},
  {id:26,time:'21:30',name:'Журнал — записать мысли',cat:'personal',dur:15},
  {id:27,time:'22:00',name:'Планирование на завтра',cat:'focus',dur:20},
  {id:28,time:'22:20',name:'Чтение перед сном',cat:'study',dur:30},
  {id:29,time:'23:00',name:'Отбой',cat:'health',dur:0},
];

const CAT={
  work:{label:'Работа',color:'#3b82f6',tag:'tag-work'},
  health:{label:'Здоровье',color:'#22c55e',tag:'tag-health'},
  personal:{label:'Личное',color:'#f59e0b',tag:'tag-personal'},
  focus:{label:'Фокус',color:'#ec4899',tag:'tag-focus'},
  study:{label:'Учёба',color:'#06b6d4',tag:'tag-study'},
  sport:{label:'Спорт',color:'#f97316',tag:'tag-sport'},
};

const QUOTES=[
  {t:'Дисциплина — это мост между целями и достижениями.',a:'Джим Рон'},
  {t:'Успех — это сумма небольших усилий, повторяемых изо дня в день.',a:'Роберт Кольер'},
  {t:'Не жди. Время никогда не будет «подходящим».',a:'Наполеон Хилл'},
  {t:'Единственный способ делать великую работу — любить то, что делаешь.',a:'Стив Джобс'},
  {t:'Каждое утро — это новый шанс изменить свою жизнь.',a:'неизвестно'},
  {t:'Твои привычки определяют твою судьбу.',a:'Джек Ма'},
  {t:'Сделай сегодня то, что другие не хотят, и завтра будешь жить иначе.',a:'неизвестно'},
];

function loadTasks(){try{const s=localStorage.getItem(TASK_SAVE);if(s)return JSON.parse(s);}catch(e){}return INIT_TASKS.map(t=>({...t,done:false}));}
function saveTasks(t){try{localStorage.setItem(TASK_SAVE,JSON.stringify(t));}catch(e){}}
function loadHist(){try{const s=localStorage.getItem(HIST_SAVE);if(s)return JSON.parse(s);}catch(e){}return [];}
function saveHist(h){try{localStorage.setItem(HIST_SAVE,JSON.stringify(h));}catch(e){}}

let tasks=loadTasks(), chartInst=null, confDone=false;

const toMin=t=>{const[h,m]=t.split(':').map(Number);return h*60+m;};
const nowMin=()=>{const n=new Date();return n.getHours()*60+n.getMinutes();};
const fmtTime=d=>d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
const fmtNow=()=>new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
const todayKey=()=>{const d=new Date();return`${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;};

function getStats(){
  const total=tasks.length, done=tasks.filter(t=>t.done).length;
  const nm=nowMin();
  const missed=tasks.filter(t=>!t.done&&toMin(t.time)<nm).length;
  const remaining=total-done-missed;
  const pct=total?Math.round(done/total*100):0;
  const totalMin=tasks.reduce((a,t)=>a+(t.dur||0),0);
  const doneMin=tasks.filter(t=>t.done).reduce((a,t)=>a+(t.dur||0),0);
  return{total,done,missed,remaining,pct,totalMin,doneMin};
}

function getCatStats(){
  const r={};
  tasks.forEach(t=>{
    if(!r[t.cat])r[t.cat]={total:0,done:0};
    r[t.cat].total++;
    if(t.done)r[t.cat].done++;
  });
  return r;
}

function timePct(){
  const S=6*60,E=23*60,nm=nowMin();
  if(nm<=S)return 0;if(nm>=E)return 100;
  return Math.round((nm-S)/(E-S)*100);
}

function showPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('pg-'+id).classList.add('active');
  btn.classList.add('active');
  if(id==='history')renderHistory();
}

/* TIMELINE */
function renderTimeline(){
  const tl=document.getElementById('tasks-scroll');if(!tl)return;
  const nm=nowMin();
  let html='', nowInserted=false;
  tasks.forEach((t,i)=>{
    const tMin=toMin(t.time);
    const nextMin=tasks[i+1]?toMin(tasks[i+1].time):Infinity;
    if(!nowInserted&&((tMin<=nm&&nm<nextMin)||(i===0&&nm<tMin))){
      nowInserted=true;
      html+=`<div class="now-bar"><div class="now-dot"></div><div class="now-t" id="now-t">${fmtNow()}</div><div class="now-sep">— сейчас</div></div>`;
    }
    const m=CAT[t.cat]||CAT.work;
    const missed=!t.done&&tMin<nm;
    const current=tMin<=nm&&nm<tMin+(t.dur||30);
    html+=`<div class="task-card cat-${t.cat}${t.done?' done':''}${missed?' missed':''}${current&&!t.done?' current-task':''}" onclick="toggle(${t.id})">
      <div class="cb${t.done?' on':''}"></div>
      <div class="ttime">${t.time}</div>
      <div class="tname">${t.name}</div>
      ${t.dur?`<div class="tdur">${t.dur}м</div>`:''}
      <div class="ttag ${m.tag}">${m.label}</div>
    </div>`;
  });
  if(!nowInserted)html=`<div class="now-bar"><div class="now-dot"></div><div class="now-t" id="now-t">${fmtNow()}</div><div class="now-sep">— сейчас</div></div>`+html;
  tl.innerHTML=html;
  setTimeout(()=>{const nb=tl.querySelector('.now-bar');if(nb)nb.scrollIntoView({block:'center',behavior:'smooth'});},100);
}

/* SIDEBAR */
function renderSidebar(){
  const sb=document.getElementById('right-col');if(!sb)return;
  const s=getStats(), cs=getCatStats(), tp=timePct();
  const dH=Math.floor(s.doneMin/60), dM=s.doneMin%60, tH=Math.floor(s.totalMin/60);

  let catRows='';
  Object.entries(CAT).forEach(([k,m])=>{
    const v=cs[k]||{total:0,done:0};
    const p=v.total?Math.round(v.done/v.total*100):0;
    catRows+=`<div class="cat-row">
      <div class="cat-dot" style="background:${m.color}"></div>
      <div class="cat-name">${m.label}</div>
      <div class="cat-bg"><div class="cat-fill" style="width:${p}%;background:${m.color}"></div></div>
      <div class="cat-meta">${v.done}/${v.total} · ${p}%</div>
    </div>`;
  });

  // activity bars
  const hist=loadHist();
  const dayNames=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
  let actBars='';
  for(let i=6;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const key=`${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
    const entry=hist.find(h=>h.key===key);
    const total=entry?entry.tasks.length:29;
    const done=entry?entry.tasks.filter(t=>t.done).length:0;
    const pct=total?Math.round(done/total*100):0;
    const hPx=Math.max(4,Math.round(pct/100*60));
    const isToday=i===0;
    const col=isToday?'var(--accent)':pct>0?'var(--a2)44':'var(--b1)';
    actBars+=`<div class="act-col">
      <div class="act-bar" style="height:${hPx}px;background:${col}" title="${pct}%"></div>
      <div class="act-lbl" style="color:${isToday?'var(--a2)':'var(--t3)'}">${dayNames[d.getDay()]}</div>
    </div>`;
  }

  // countdown
  const now=new Date();
  const end=new Date();end.setHours(23,0,0,0);
  const start=new Date();start.setHours(6,0,0,0);
  const leftMs=Math.max(0,end-now);
  const cdH=Math.floor(leftMs/3600000);
  const cdM=Math.floor((leftMs%3600000)/60000);
  const cdPct=Math.round((1-leftMs/(end-start))*100);
  const cdDash=144.5*(1-cdPct/100);

  sb.innerHTML=`
    <!-- ПРОГРЕСС -->
    <div class="rb">
      <div class="rb-title">Прогресс дня</div>
      <div class="prog-item">
        <div class="prog-meta"><span class="prog-name">Задачи</span><span class="prog-val" id="pp">${s.pct}%</span></div>
        <div class="prog-bg" style="height:18px"><div class="prog-fill" id="pf-t" style="width:${s.pct}%;height:18px;background:linear-gradient(90deg,var(--accent),var(--a2))"></div></div>
      </div>
      <div class="prog-item">
        <div class="prog-meta"><span class="prog-name">Время дня</span><span class="prog-val">${tp}%</span></div>
        <div class="prog-bg" style="height:14px"><div class="prog-fill" id="pf-d" style="width:${tp}%;height:14px;background:linear-gradient(90deg,#ef4444,#f97316)"></div></div>
      </div>
      <div class="prog-item">
        <div class="prog-meta"><span class="prog-name">Продуктивных минут</span><span class="prog-val" style="color:var(--study)">${dH}ч ${dM}м / ${tH}ч</span></div>
        <div class="prog-bg" style="height:14px"><div class="prog-fill" id="pf-m" style="width:${s.totalMin?Math.round(s.doneMin/s.totalMin*100):0}%;height:14px;background:var(--study)"></div></div>
      </div>
    </div>

    <!-- КАТЕГОРИИ -->
    <div class="rb">
      <div class="rb-title">По категориям</div>
      ${catRows}
    </div>

    <!-- ДИАГРАММА -->
    <div class="rb">
      <div class="rb-title">Распределение</div>
      <div class="chart-wrap"><canvas id="dnt"></canvas>
        <div class="chart-center"><div class="chart-pct" id="cpct">${s.pct}%</div><div class="chart-sub">ГОТОВО</div></div>
      </div>
      <div class="chart-legend">
        ${Object.entries(CAT).map(([k,m])=>{const v=cs[k]||{total:0,done:0};return`<div class="leg-item"><div class="leg-left"><div class="leg-dot" style="background:${m.color}"></div><span>${m.label}</span></div><span class="leg-val">${v.done}/${v.total}</span></div>`;}).join('')}
      </div>
    </div>

    <!-- ДЕТАЛИ -->
    <div class="rb">
      <div class="rb-title">Детали</div>
      <div class="mini-grid">
        <div class="mini-card"><div class="mini-val" id="md">${s.done}</div><div class="mini-lbl">ЗАДАЧ ГОТОВО</div></div>
        <div class="mini-card"><div class="mini-val">${dH}ч ${dM}м</div><div class="mini-lbl">ПРОДУКТИВНОСТЬ</div></div>
        <div class="mini-card"><div class="mini-val" style="color:var(--red)">${s.missed}</div><div class="mini-lbl">ПРОПУЩЕНО</div></div>
        <div class="mini-card"><div class="mini-val" style="color:var(--study)">${(cs.study||{done:0}).done}</div><div class="mini-lbl">УЧЁБА ГОТОВА</div></div>
      </div>
    </div>

    <!-- АКТИВНОСТЬ -->
    <div class="rb">
      <div class="rb-title">Активность — 7 дней</div>
      <div class="act-bars">${actBars}</div>
    </div>

    <!-- ТАЙМЕР -->
    <div class="rb">
      <div class="rb-title">До конца дня</div>
      <div class="cd-wrap">
        <div class="cd-left">
          <div class="cd-val" id="cd-val">${cdH}ч ${cdM}м</div>
          <div class="cd-lbl">ЧАСОВ ОСТАЛОСЬ</div>
        </div>
        <div class="cd-ring">
          <svg width="70" height="70" viewBox="0 0 70 70">
            <circle fill="none" stroke="var(--b1)" stroke-width="6" cx="35" cy="35" r="28"/>
            <circle fill="none" stroke="var(--accent)" stroke-width="6" stroke-linecap="round"
              cx="35" cy="35" r="28" stroke-dasharray="175.9" stroke-dashoffset="${175.9*(1-cdPct/100)}"
              id="cd-ring" style="transition:stroke-dashoffset .5s"/>
          </svg>
          <div class="cd-pct" id="cd-pct">${cdPct}%</div>
        </div>
      </div>
    </div>
  `;
  buildChart(s,cs);
}

function buildChart(s,cs){
  const c=document.getElementById('dnt');if(!c)return;
  if(chartInst){chartInst.destroy();chartInst=null;}
  const labels=Object.keys(CAT);
  const data=labels.map(k=>(cs[k]||{done:0}).done);
  const colors=labels.map(k=>CAT[k].color);
  const hasData=data.some(v=>v>0);
  chartInst=new Chart(c,{
    type:'doughnut',
    data:{labels:labels.map(k=>CAT[k].label),datasets:[{data:hasData?data:[1],backgroundColor:hasData?colors:['#252535'],borderWidth:0,hoverOffset:6}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'68%',plugins:{legend:{display:false},tooltip:{enabled:hasData}}}
  });
}

function patchUI(){
  const s=getStats(), cs=getCatStats();
  const byId=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  byId('lh-done-txt',`выполнено ${s.done} из ${s.total}`);
  byId('lh-pct',s.pct+'%');
  byId('card-done',s.done);byId('card-rem',s.remaining);byId('card-miss',s.missed);
  byId('cpct',s.pct+'%');byId('md',s.done);byId('pp',s.pct+'%');
  const pf=id=>document.getElementById(id);
  if(pf('lh-bar'))pf('lh-bar').style.width=s.pct+'%';
  if(pf('pf-t'))pf('pf-t').style.width=s.pct+'%';
  if(pf('pf-d'))pf('pf-d').style.width=timePct()+'%';
  if(pf('pf-m'))pf('pf-m').style.width=(s.totalMin?Math.round(s.doneMin/s.totalMin*100):0)+'%';
  const catFills=document.querySelectorAll('.cat-fill');
  const catMetas=document.querySelectorAll('.cat-meta');
  Object.keys(CAT).forEach((k,i)=>{
    const v=cs[k]||{total:0,done:0};
    const p=v.total?Math.round(v.done/v.total*100):0;
    if(catFills[i])catFills[i].style.width=p+'%';
    if(catMetas[i])catMetas[i].textContent=`${v.done}/${v.total} · ${p}%`;
  });
  document.querySelectorAll('.task-card').forEach(card=>{
    const oc=card.getAttribute('onclick')||'';
    const m=oc.match(/toggle\((\d+)\)/);if(!m)return;
    const t=tasks.find(t=>t.id===+m[1]);if(!t)return;
    const cb=card.querySelector('.cb');
    if(t.done){card.classList.add('done');if(cb)cb.classList.add('on');}
    else{card.classList.remove('done');if(cb)cb.classList.remove('on');}
  });
  buildChart(s,cs);
}

function toggle(id){
  tasks=tasks.map(t=>t.id===id?{...t,done:!t.done}:t);
  saveTasks(tasks);saveHistEntry();patchUI();
  const s=getStats();
  if(s.done===s.total&&s.total>0&&!confDone)launchConfetti();
}

function saveHistEntry(){
  const key=todayKey();
  const hist=loadHist();
  const label=new Date().toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const existing=hist.findIndex(h=>h.key===key);
  const entry={key,label,tasks:tasks.map(t=>({id:t.id,name:t.name,cat:t.cat,time:t.time,done:t.done}))};
  if(existing>=0)hist[existing]=entry;else hist.unshift(entry);
  saveHist(hist.slice(0,30));
}

function resetDay(){
  saveHistEntry();
  tasks=INIT_TASKS.map(t=>({...t,done:false}));
  saveTasks(tasks);confDone=false;
  renderTimeline();renderSidebar();
}

function calcStreak(){
  const hist=loadHist();
  let streak=0;
  const today=new Date();
  for(let i=0;i<30;i++){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const key=`${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
    const entry=hist.find(h=>h.key===key);
    if(entry&&entry.tasks&&entry.tasks.some(t=>t.done))streak++;
    else if(i>0)break;
  }
  return streak;
}

/* HISTORY */
function renderHistory(){
  const container=document.getElementById('hist-days');if(!container)return;
  const hist=loadHist();
  if(!hist.length){
    container.innerHTML=`<div class="no-hist"><div class="no-hist-ico">📅</div><div>История появится, как только ты начнёшь отмечать задачи.</div></div>`;
    return;
  }
  container.innerHTML=hist.map((day,idx)=>{
    const total=day.tasks.length, done=day.tasks.filter(t=>t.done).length;
    const pct=total?Math.round(done/total*100):0;
    const tasksHTML=day.tasks.map(t=>{
      const m=CAT[t.cat]||CAT.work;
      return`<div class="hist-task-row">
        <div class="hist-task-dot" style="background:${m.color}"></div>
        <div class="hist-task-name">${t.time} · ${t.name}</div>
        <div class="hist-task-done ${t.done?'hd-yes':'hd-no'}">${t.done?'✓':'—'}</div>
      </div>`;
    }).join('');
    return`<div class="hist-day">
      <div class="hist-day-hdr" onclick="toggleHistDay(${idx})">
        <div class="hist-day-date">${day.label}</div>
        <div class="hist-day-meta">
          <div class="hist-day-pct">${pct}%</div>
          <div class="hist-day-bar"><div class="hist-day-bar-fill" style="width:${pct}%"></div></div>
          <span style="font-family:var(--mono);font-size:12px;color:var(--t3)">${done}/${total}</span>
        </div>
      </div>
      <div class="hist-tasks" id="hdt-${idx}">${tasksHTML}</div>
    </div>`;
  }).join('');
}

function toggleHistDay(idx){
  const el=document.getElementById('hdt-'+idx);
  if(el)el.classList.toggle('open');
}

function launchConfetti(){
  confDone=true;
  const layer=document.getElementById('confetti');if(!layer)return;
  const colors=['#a78bfa','#60a5fa','#34d399','#f59e0b','#f87171','#c084fc','#fb923c','#06b6d4'];
  for(let i=0;i<120;i++){
    setTimeout(()=>{
      const el=document.createElement('div');el.className='cp';
      el.style.cssText=`left:${Math.random()*100}%;background:${colors[~~(Math.random()*colors.length)]};width:${7+Math.random()*8}px;height:${7+Math.random()*8}px;animation-duration:${2+Math.random()*2.5}s;animation-delay:${Math.random()*.5}s`;
      layer.appendChild(el);setTimeout(()=>el.remove(),5000);
    },i*20);
  }
}

function updateCountdown(){
  const now=new Date();
  const end=new Date();end.setHours(23,0,0,0);
  const start=new Date();start.setHours(6,0,0,0);
  const leftMs=Math.max(0,end-now);
  const cdH=Math.floor(leftMs/3600000);
  const cdM=Math.floor((leftMs%3600000)/60000);
  const cdPct=Math.round((1-leftMs/(end-start))*100);
  const byId=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  byId('cd-val',`${cdH}ч ${cdM}м`);
  byId('cd-pct',cdPct+'%');
  const ring=document.getElementById('cd-ring');
  if(ring)ring.style.strokeDashoffset=175.9*(1-cdPct/100);
}

function tick(){
  const now=new Date();
  const cl=document.getElementById('clock');if(cl)cl.textContent=fmtTime(now);
  const nt=document.getElementById('now-t');if(nt)nt.textContent=fmtNow();
  const pfd=document.getElementById('pf-d');if(pfd)pfd.style.width=timePct()+'%';
}

/* INIT */
const nowD=new Date();
const dl=document.getElementById('lh-date');
if(dl)dl.textContent=nowD.toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long'});

// Quote
const q=QUOTES[nowD.getDay()%QUOTES.length];
const qtEl=document.getElementById('quote-text');
const qaEl=document.getElementById('quote-author');
if(qtEl)qtEl.textContent=q.t;
if(qaEl)qaEl.textContent='— '+q.a;

// Streak
const snEl=document.getElementById('streak-n');
if(snEl)snEl.textContent=calcStreak();

renderTimeline();
renderSidebar();

setInterval(tick,1000);
setInterval(updateCountdown,30000);
</script>
</body>
</html>
