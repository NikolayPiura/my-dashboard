<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дашборд</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Unbounded:wght@400;700;800&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07070c;--s1:#0f0f18;--s2:#141420;--s3:#1a1a28;
  --b1:#2a2a40;--b2:#363650;--b3:#424260;
  --accent:#7c5cfc;--a2:#a78bfa;--a3:#c4b5fd;
  --text:#e8e8f4;--t2:#8888a8;--t3:#4a4a68;
  --work:#3b82f6;--health:#22c55e;--personal:#f59e0b;
  --focus:#ec4899;--study:#06b6d4;--sport:#f97316;
  --red:#ef4444;--green:#22c55e;
  --mono:'JetBrains Mono',monospace;
  --title:'Unbounded',sans-serif;
  --sans:'Golos Text',sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans)}

/* ══ NAV ══ */
.nav{display:flex;height:80px;background:var(--s1);border-bottom:2px solid var(--b1);align-items:stretch;padding:0 36px;gap:0;flex-shrink:0}
.nav-btn{font-family:var(--mono);font-size:20px;letter-spacing:3px;color:var(--t2);padding:0 40px;border:none;background:transparent;cursor:pointer;border-bottom:4px solid transparent;margin-bottom:-2px;transition:all .2s;white-space:nowrap;display:flex;align-items:center}
.nav-btn:hover{color:var(--a2);background:rgba(167,139,250,.06)}
.nav-btn.active{color:var(--a2);border-bottom-color:var(--accent);background:rgba(167,139,250,.08)}
.nav-clock{font-family:var(--mono);font-size:36px;font-weight:700;letter-spacing:5px;color:var(--text);margin-left:auto;align-self:center}

/* ══ PAGES ══ */
.page{display:none;height:calc(100vh - 80px);overflow:hidden}
.page.active{display:grid}

/* ══ TODAY — 2 columns ══ */
#pg-today{grid-template-columns:1fr 1fr}

/* ═══ LEFT COLUMN ═══ */
.left-col{display:grid;grid-template-rows:auto 1fr;border-right:1px solid var(--b1);overflow:hidden}

/* Header block */
.left-header{background:var(--s1);border-bottom:1px solid var(--b1);padding:24px 30px 20px;display:flex;flex-direction:column;gap:16px}
.lh-date{font-family:var(--title);font-size:36px;font-weight:800;color:var(--text);line-height:1}
.lh-row{display:flex;align-items:center;gap:14px}
.lh-done{font-family:var(--title);font-size:24px;font-weight:800;color:var(--text)}
.lh-pct{font-family:var(--mono);font-size:24px;font-weight:700;color:var(--a2)}
.lh-bar-wrap{flex:1;height:8px;background:var(--b1);border-radius:4px;overflow:hidden}
.lh-bar{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--a2));transition:width .5s}
.lh-reset{font-family:var(--mono);font-size:11px;background:transparent;border:1px solid var(--b2);color:var(--t2);padding:6px 14px;border-radius:6px;cursor:pointer;letter-spacing:.5px;flex-shrink:0;transition:all .2s}
.lh-reset:hover{border-color:var(--accent);color:var(--a2)}
/* Big 3 cards */
.lh-cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.lh-card{background:var(--s3);border:1px solid var(--b1);border-radius:14px;padding:20px;text-align:center}
.lh-card-val{font-family:var(--title);font-size:52px;font-weight:800;line-height:1;margin-bottom:6px}
.lh-card-lbl{font-size:11px;color:var(--t2);letter-spacing:1px;font-family:var(--mono)}
.lh-card.green .lh-card-val{color:var(--green)}
.lh-card.blue .lh-card-val{color:var(--work)}
.lh-card.red .lh-card-val{color:var(--red)}

/* Tasks scroll */
.tasks-scroll{overflow-y:auto;overflow-x:hidden;padding:10px 14px;scrollbar-width:thin;scrollbar-color:var(--b2) transparent}
.tasks-scroll::-webkit-scrollbar{width:3px}
.tasks-scroll::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

.task-card{display:flex;align-items:center;gap:10px;background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:9px 12px;margin-bottom:5px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.task-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.task-card.cat-work::before{background:var(--work)}
.task-card.cat-health::before{background:var(--health)}
.task-card.cat-personal::before{background:var(--personal)}
.task-card.cat-focus::before{background:var(--focus)}
.task-card.cat-study::before{background:var(--study)}
.task-card.cat-sport::before{background:var(--sport)}
.task-card:hover{border-color:var(--b2);background:var(--s3);transform:translateX(3px)}
.task-card.done{opacity:.33}
.task-card.done .tname{text-decoration:line-through;color:var(--t3)}
.task-card.current-task{border-color:var(--accent)}
.task-card.missed:not(.done){border-color:#ef444430}
.cb{width:17px;height:17px;border-radius:4px;border:1.5px solid var(--b3);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.cb.on{background:var(--accent);border-color:var(--accent)}
.cb.on::after{content:'✓';font-size:10px;color:#fff;font-weight:700}
.ttime{font-family:var(--mono);font-size:10px;color:var(--t3);flex-shrink:0;min-width:36px}
.tname{font-size:12px;flex:1;line-height:1.3;font-weight:500}
.tdur{font-size:9px;color:var(--t3);font-family:var(--mono);flex-shrink:0}
.ttag{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600;flex-shrink:0}
.tag-work{background:#1a3050;color:#60a5fa}
.tag-health{background:#0f3020;color:#4ade80}
.tag-personal{background:#382008;color:#fbbf24}
.tag-focus{background:#400a25;color:#f9a8d4}
.tag-study{background:#052535;color:#67e8f9}
.tag-sport{background:#38200a;color:#fb923c}
.now-bar{display:flex;align-items:center;gap:8px;margin:5px 0;padding:6px 12px;background:#ef444412;border:1px solid #ef444440;border-radius:7px}
.now-dot{width:9px;height:9px;border-radius:50%;background:var(--red);box-shadow:0 0 8px var(--red);flex-shrink:0;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.now-t{font-family:var(--mono);font-size:11px;color:var(--red);font-weight:700}
.now-sep{font-size:10px;color:var(--t3)}

/* ═══ RIGHT COLUMN — single col, fills 100% ═══ */
.right-col{display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;background:var(--s1);scrollbar-width:thin;scrollbar-color:var(--b2) transparent}
.right-col::-webkit-scrollbar{width:3px}
.right-col::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

.rb{padding:20px 26px;border-bottom:1px solid var(--b1);flex-shrink:0}
.rb-title{font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--t3);text-transform:uppercase;margin-bottom:14px}

/* Progress bars */
.pi{margin-bottom:13px}
.pi:last-child{margin-bottom:0}
.pi-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.pi-name{font-size:13px;color:var(--t2);font-weight:500}
.pi-val{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--a2)}
.pi-bg{background:var(--s3);border-radius:7px;overflow:hidden}
.pi-fill{border-radius:7px;transition:width .6s cubic-bezier(.4,0,.2,1)}

/* Cat bars */
.cat-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.cat-row:last-child{margin-bottom:0}
.cat-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.cat-name{font-size:13px;color:var(--t2);width:68px;flex-shrink:0;font-weight:500}
.cat-bg{flex:1;background:var(--s3);border-radius:5px;height:9px;overflow:hidden}
.cat-fill{height:100%;border-radius:5px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.cat-meta{font-family:var(--mono);font-size:11px;color:var(--t3);width:64px;text-align:right;flex-shrink:0}

/* Doughnut */
.chart-row{display:flex;align-items:center;gap:24px}
.chart-wrap{position:relative;width:170px;height:170px;flex-shrink:0}
.chart-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
.chart-pct{font-family:var(--title);font-size:32px;font-weight:800;color:var(--a2)}
.chart-sub{font-size:9px;color:var(--t3);letter-spacing:1px;margin-top:2px;font-family:var(--mono)}
.chart-legend{flex:1;display:flex;flex-direction:column;gap:8px}
.leg-item{display:flex;align-items:center;justify-content:space-between;font-size:13px;color:var(--t2);background:var(--s3);border:1px solid var(--b1);border-radius:8px;padding:8px 12px}
.leg-left{display:flex;align-items:center;gap:8px}
.leg-dot{width:9px;height:9px;border-radius:3px;flex-shrink:0}
.leg-val{font-family:var(--mono);font-size:12px;color:var(--a2);font-weight:700}

/* Mini cards */
.mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mini-card{background:var(--s3);border:1px solid var(--b1);border-radius:12px;padding:18px}
.mini-val{font-family:var(--title);font-size:30px;font-weight:700;color:var(--a2);margin-bottom:4px}
.mini-lbl{font-size:10px;color:var(--t3);font-family:var(--mono);letter-spacing:.5px}

/* Streak */
.streak-row{display:flex;align-items:center;gap:16px}
.streak-num{font-family:var(--title);font-size:56px;font-weight:800;color:#f97316;line-height:1}
.streak-info{display:flex;flex-direction:column;gap:4px}
.streak-lbl{font-size:13px;color:var(--t2)}
.streak-sub{font-size:11px;color:var(--t3);font-family:var(--mono)}

/* Week activity */
.week-bars{display:flex;align-items:flex-end;gap:8px;height:60px;margin-top:4px}
.week-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.week-bar-bg{flex:1;width:100%;background:var(--s3);border-radius:4px 4px 0 0;display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden}
.week-bar-fill{width:100%;border-radius:4px 4px 0 0;transition:height .5s cubic-bezier(.4,0,.2,1)}
.week-bar-lbl{font-family:var(--mono);font-size:9px;color:var(--t3);text-align:center}

/* Countdown */
.countdown-row{display:flex;align-items:center;justify-content:space-between}
.cd-left{display:flex;flex-direction:column;gap:6px}
.cd-num{font-family:var(--title);font-size:48px;font-weight:800;color:var(--a2);line-height:1}
.cd-lbl{font-size:12px;color:var(--t2);font-family:var(--mono);letter-spacing:.5px}
.cd-ring-wrap{position:relative;width:90px;height:90px;flex-shrink:0}
.cd-ring-wrap svg{transform:rotate(-90deg)}
.cd-pct-txt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:13px;font-weight:700;color:var(--a2)}

/* Quote */
.quote-block{background:var(--s3);border:1px solid var(--b1);border-left:3px solid var(--accent);border-radius:0 10px 10px 0;padding:16px 18px}
.quote-text{font-size:14px;color:var(--text);line-height:1.6;font-style:italic}
.quote-author{font-family:var(--mono);font-size:10px;color:var(--t3);margin-top:8px}

/* ══ HISTORY PAGE ══ */
#pg-history{display:block!important;overflow-y:auto}
#pg-history.active{display:block}
.hist-body{padding:28px 32px;max-width:900px;margin:0 auto}
.hist-title{font-family:var(--title);font-size:22px;font-weight:800;margin-bottom:6px}
.hist-sub{font-size:13px;color:var(--t2);margin-bottom:24px}
.hist-day{background:var(--s2);border:1px solid var(--b1);border-radius:12px;overflow:hidden;margin-bottom:14px}
.hist-day-hd{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background .2s}
.hist-day-hd:hover{background:var(--s3)}
.hist-day-date{font-family:var(--title);font-size:13px;font-weight:700}
.hist-day-meta{display:flex;align-items:center;gap:12px}
.hist-day-pct{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--a2)}
.hist-day-bw{width:120px;height:5px;background:var(--b1);border-radius:3px;overflow:hidden}
.hist-day-bf{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--a2))}
.hist-tasks{padding:0 18px 14px;display:none;border-top:1px solid var(--b1)}
.hist-tasks.open{display:block}
.hist-task-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--b1)22}
.hist-task-row:last-child{border-bottom:none}
.hist-task-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.hist-task-name{font-size:11px;flex:1;color:var(--t2)}
.hist-done-y{font-family:var(--mono);font-size:9px;padding:2px 5px;border-radius:3px;background:#22c55e20;color:#4ade80}
.hist-done-n{font-family:var(--mono);font-size:9px;padding:2px 5px;border-radius:3px;background:#ef444420;color:#f87171}
.no-hist{text-align:center;padding:80px 20px;color:var(--t3)}
.no-hist-ico{font-size:52px;margin-bottom:14px}

/* ══ LEARNING PAGE ══ */
#pg-learning{display:block!important;overflow:hidden}
#pg-learning.active{display:flex;flex-direction:column}
.learn-hd{padding:16px 22px 12px;background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.learn-hd-title{font-family:var(--title);font-size:16px;font-weight:800}
.learn-hd-right{display:flex;align-items:center;gap:16px}
.learn-stat-val{font-family:var(--title);font-size:18px;font-weight:800;color:var(--a2)}
.learn-stat-lbl{font-size:9px;color:var(--t3);font-family:var(--mono)}
.learn-ring{position:relative;width:50px;height:50px}
.learn-ring svg{transform:rotate(-90deg)}
.ring-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9px;font-weight:700;color:var(--a2)}
.learn-nav{display:flex;background:var(--s2);border-bottom:1px solid var(--b1);flex-shrink:0}
.learn-nav-btn{flex:1;padding:10px 0;background:none;border:none;color:var(--t2);font-family:var(--mono);font-size:10px;letter-spacing:1px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;text-transform:uppercase}
.learn-nav-btn.active{color:var(--a2);border-bottom-color:var(--accent)}
.learn-scroll{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--b2) transparent}
.learn-scroll::-webkit-scrollbar{width:3px}
.learn-scroll::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
.lpage{display:none;padding:12px 16px}
.lpage.vis{display:block}
.vid-filters{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.vf-btn{padding:4px 10px;border-radius:20px;border:1px solid var(--b2);background:transparent;color:var(--t2);font-family:var(--sans);font-size:10px;cursor:pointer;transition:all .2s;white-space:nowrap}
.vf-btn.active{font-weight:600;color:#0a0a0f}
.vblk{margin-bottom:16px}
.vblk-hd{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.vblk-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.vblk-name{font-family:var(--title);font-size:10px;font-weight:700;letter-spacing:.5px;flex:1}
.vblk-cnt{font-size:10px;color:var(--t2)}
.vblk-avg{font-family:var(--mono);font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;background:var(--s3);display:none}
.vblk-bar{height:2px;background:var(--b1);border-radius:2px;margin-bottom:8px;overflow:hidden}
.vblk-bar-fill{height:100%;border-radius:2px;transition:width .4s}
.vid-list{display:flex;flex-direction:column;gap:3px}
.vid-row{display:flex;align-items:stretch;gap:4px}
.vid-card{flex:1;display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;border:1px solid var(--b1);background:var(--s2);cursor:pointer;min-width:0;transition:opacity .2s}
.vid-card:hover{border-color:var(--b2);background:var(--s3)}
.vid-card.done{opacity:.38}
.vid-card.done .vid-title{text-decoration:line-through}
.vid-chk{width:16px;height:16px;border-radius:4px;border:1.5px solid rgba(255,255,255,.18);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.vid-chk svg{display:none}
.vid-card.done .vid-chk svg{display:block}
.vid-info{flex:1;min-width:0}
.vid-title{font-size:11px;font-weight:500;line-height:1.3}
.vid-meta{display:flex;gap:5px;margin-top:2px;align-items:center}
.vid-ch{font-size:9px;color:var(--t2)}
.vid-dur{font-size:8px;font-family:var(--mono);color:var(--t2);background:var(--s3);padding:1px 4px;border-radius:3px}
.vid-btn{width:34px;flex-shrink:0;border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;border:1px solid var(--b1);background:var(--s2);text-decoration:none;color:var(--t2);flex-direction:column;gap:1px}
.vid-btn.yt{background:rgba(255,50,50,.1);border-color:rgba(255,50,50,.2);color:#ff5555}
.vid-btn.tst{background:rgba(124,92,252,.1);border-color:rgba(124,92,252,.2);color:var(--a2)}
.vid-btn.scr{font-size:9px}
.scr-num{font-family:var(--mono);font-size:10px;font-weight:700}
.scr-no{font-size:7px;color:var(--t3);text-align:center;line-height:1.2}
.lstats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.lstat-card{background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:14px}
.lstat-val{font-family:var(--title);font-size:22px;font-weight:800;margin-bottom:3px}
.lstat-lbl{font-size:9px;color:var(--t2);font-family:var(--mono);letter-spacing:.5px}
.lrep-section{background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:14px;margin-bottom:10px}
.lrep-section h3{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--t3);margin-bottom:10px;text-transform:uppercase}
.lrep-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #2a2a4033;font-size:11px}
.lrep-row:last-child{border-bottom:none}
.lrep-val{font-family:var(--mono);font-size:11px;font-weight:700}
.lblk-stat-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #2a2a4033}
.lblk-stat-row:last-child{border-bottom:none}
.lblk-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.lblk-name{font-size:11px;flex:1}
.lblk-bw{width:80px;height:4px;background:var(--b1);border-radius:2px;overflow:hidden}
.lblk-bf{height:100%;border-radius:2px}
.lblk-val{font-family:var(--mono);font-size:9px;font-weight:700;width:28px;text-align:right}
.lblk-score{font-size:9px;width:30px;text-align:right;font-family:var(--mono)}
/* Test overlay */
.test-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;overflow-y:auto;padding:16px;align-items:flex-start;justify-content:center}
.test-overlay.open{display:flex}
.test-modal{background:var(--s2);border:1px solid var(--b2);border-radius:14px;max-width:460px;width:100%;margin:auto}
.test-hd{padding:14px 16px;display:flex;align-items:flex-start;justify-content:space-between;border-bottom:1px solid var(--b1);gap:8px}
.test-ttl{font-family:var(--title);font-size:11px;font-weight:700;line-height:1.4;flex:1}
.test-x{background:none;border:none;color:var(--t2);font-size:22px;cursor:pointer;line-height:1;flex-shrink:0}
.test-body{padding:16px}
.q-dots{margin-bottom:10px}
.q-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin:0 2px}
.q-txt{font-size:13px;font-weight:500;line-height:1.5;margin-bottom:12px}
.q-opts{display:flex;flex-direction:column;gap:6px}
.q-opt{padding:9px 12px;border-radius:7px;border:1px solid var(--b1);background:var(--s3);font-size:12px;cursor:pointer;text-align:left;color:var(--text);transition:all .15s}
.q-opt:hover{border-color:var(--b2)}
.q-opt.correct{background:rgba(34,197,94,.2);border-color:#22c55e;color:#4ade80}

<script>
const TASK_SAVE='dash_v5',HIST_SAVE='dash_hist_v1';
const QUOTES=[
  {t:'Дисциплина — это мост между целями и достижениями.',a:'Джим Рон'},
  {t:'Не считай дни — сделай так, чтобы каждый день считался.',a:'Мухаммед Али'},
  {t:'Маленький шаг каждый день приводит к большим результатам.',a:'—'},
  {t:'Успех — это сумма небольших усилий, повторяемых изо дня в день.',a:'Роберт Кольер'},
  {t:'Сделай сегодня то, что другие не хотят делать.',a:'—'},
  {t:'Ты не обязан быть крутым — ты обязан становиться лучше.',a:'—'},
  {t:'Фокус — это умение говорить "нет" всему, кроме главного.',a:'Стив Джобс'},
];
const INIT_TASKS=[
  {id:1,time:'06:30',name:'Подъём и стакан воды',cat:'health',dur:10},
  {id:2,time:'06:45',name:'Утренняя зарядка',cat:'sport',dur:15},
  {id:3,time:'07:00',name:'Контрастный душ',cat:'health',dur:10},
  {id:4,time:'07:15',name:'Завтрак',cat:'personal',dur:20},

  {id:6,time:'08:00',name:'Пробежка 30 минут',cat:'sport',dur:30},

  {id:9,time:'09:30',name:'Обработка задач из почты',cat:'work',dur:30},
  {id:10,time:'10:00',name:'Встреча с командой',cat:'work',dur:60},
  {id:11,time:'11:00',name:'Deep work — основной проект',cat:'focus',dur:90},
  {id:12,time:'12:30',name:'Обед',cat:'personal',dur:30},
  {id:13,time:'13:00',name:'Код-ревью',cat:'work',dur:45},
  {id:14,time:'13:50',name:'Ответы на Slack',cat:'work',dur:20},
  {id:15,time:'14:00',name:'Звонок с клиентом',cat:'work',dur:45},
  {id:16,time:'15:00',name:'Изучить новую библиотеку',cat:'study',dur:60},
  {id:17,time:'15:30',name:'Написать отчёт',cat:'work',dur:60},
  {id:18,time:'16:30',name:'Прогулка / разгрузка',cat:'health',dur:30},
  {id:19,time:'17:00',name:'Блок фокусной работы',cat:'focus',dur:90},
  {id:20,time:'18:00',name:'Чтение — 30 минут',cat:'study',dur:30},
  {id:21,time:'18:30',name:'Приготовить ужин',cat:'personal',dur:30},
  {id:22,time:'19:00',name:'Ужин',cat:'personal',dur:30},
  {id:23,time:'19:30',name:'Онлайн-курс / лекция',cat:'study',dur:60},
  {id:24,time:'20:00',name:'Спортзал',cat:'sport',dur:60},
  {id:25,time:'21:00',name:'Медитация',cat:'health',dur:20},
  {id:26,time:'21:30',name:'Журнал — записать мысли',cat:'personal',dur:15},
  {id:27,time:'22:00',name:'Планирование на завтра',cat:'focus',dur:20},
  {id:28,time:'22:20',name:'Чтение перед сном',cat:'study',dur:30},
  {id:29,time:'23:00',name:'Отбой',cat:'health',dur:0},
];
const CAT={
  work:{label:'Работа',color:'#3b82f6',tag:'tag-work'},
  health:{label:'Здоровье',color:'#22c55e',tag:'tag-health'},
  personal:{label:'Личное',color:'#f59e0b',tag:'tag-personal'},
  focus:{label:'Фокус',color:'#ec4899',tag:'tag-focus'},
  study:{label:'Учёба',color:'#06b6d4',tag:'tag-study'},
  sport:{label:'Спорт',color:'#f97316',tag:'tag-sport'},
};
function lT(){try{const s=localStorage.getItem(TASK_SAVE);if(s)return JSON.parse(s);}catch(e){}return INIT_TASKS.map(t=>({...t,done:false}));}
function sT(t){try{localStorage.setItem(TASK_SAVE,JSON.stringify(t));}catch(e){}}
function lH(){try{const s=localStorage.getItem(HIST_SAVE);if(s)return JSON.parse(s);}catch(e){}return[];}
function sH(h){try{localStorage.setItem(HIST_SAVE,JSON.stringify(h));}catch(e){}}
let tasks=lT(),chartInst=null,confDone=false;
const toMin=t=>{const[h,m]=t.split(':').map(Number);return h*60+m;};
const nowMin=()=>{const n=new Date();return n.getHours()*60+n.getMinutes();};
const fmt=d=>d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
const fmtNow=()=>new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
const todayKey=()=>{const d=new Date();return`${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;};
function getStats(){
  const total=tasks.length,done=tasks.filter(t=>t.done).length;
  const nm=nowMin();
  const missed=tasks.filter(t=>!t.done&&toMin(t.time)<nm).length;
  const remaining=total-done-missed;
  const pct=total?Math.round(done/total*100):0;
  const totalMin=tasks.reduce((a,t)=>a+(t.dur||0),0);
  const doneMin=tasks.filter(t=>t.done).reduce((a,t)=>a+(t.dur||0),0);
  return{total,done,missed,remaining,pct,totalMin,doneMin};
}
function getCS(){
  const r={};
  tasks.forEach(t=>{
    if(!r[t.cat])r[t.cat]={total:0,done:0,doneMin:0,totalMin:0};
    r[t.cat].total++;r[t.cat].totalMin+=t.dur||0;
    if(t.done){r[t.cat].done++;r[t.cat].doneMin+=t.dur||0;}
  });
  return r;
}
function timePct(){
  const START=6*60,END=23*60,nm=nowMin();
  if(nm<=START)return 0;if(nm>=END)return 100;
  return Math.round((nm-START)/(END-START)*100);
}
function hoursLeft(){
  const END=23*60,nm=nowMin();
  const mins=Math.max(0,END-nm);
  return(mins/60).toFixed(1);
}
function dayPct(){
  return timePct();
}

/* ── PAGE NAV ── */
function showPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('pg-'+id).classList.add('active');
  btn.classList.add('active');
  if(id==='history')renderHistory();
  if(id==='learning'){renderLearnVideos();updLearnStats();}
}

/* ── TIMELINE ── */
function renderTimeline(){
  const tl=document.getElementById('tasks-scroll');if(!tl)return;
  const nm=nowMin();
  let html='',nowInserted=false;
  tasks.forEach((t,i)=>{
    const tMin=toMin(t.time);
    const nextMin=tasks[i+1]?toMin(tasks[i+1].time):Infinity;
    if(!nowInserted&&((tMin<=nm&&nm<nextMin)||(i===0&&nm<tMin))){
      nowInserted=true;
      html+=`<div class="now-bar"><div class="now-dot"></div><div class="now-t" id="nb-t">${fmtNow()}</div><div class="now-sep">— сейчас</div></div>`;
    }
    const m=CAT[t.cat]||CAT.work;
    const missed=!t.done&&tMin<nm;
    const current=tMin<=nm&&nm<tMin+(t.dur||30);
    html+=`<div class="task-card cat-${t.cat}${t.done?' done':''}${missed?' missed':''}${current&&!t.done?' current-task':''}" onclick="toggleTask(${t.id})">
      <div class="cb${t.done?' on':''}"></div>
      <div class="ttime">${t.time}</div>
      <div class="tname">${t.name}</div>
      ${t.dur?`<div class="tdur">${t.dur}м</div>`:''}
      <div class="ttag ${m.tag}">${m.label}</div>
    </div>`;
  });
  if(!nowInserted)html=`<div class="now-bar"><div class="now-dot"></div><div class="now-t" id="nb-t">${fmtNow()}</div><div class="now-sep">— сейчас</div></div>`+html;
  tl.innerHTML=html;
  setTimeout(()=>{const nb=tl.querySelector('.now-bar');if(nb)nb.scrollIntoView({block:'center',behavior:'smooth'});},100);
}

/* ── SIDEBAR ── */
function renderSidebar(){
  const sb=document.getElementById('right-col');if(!sb)return;
  const s=getStats(),cs=getCS(),tp=timePct();
  const dH=Math.floor(s.doneMin/60),dM=s.doneMin%60,tH=Math.floor(s.totalMin/60);

  let catRows='';
  Object.entries(CAT).forEach(([k,m])=>{
    const v=cs[k]||{total:0,done:0};
    const p=v.total?Math.round(v.done/v.total*100):0;
    catRows+=`<div class="cat-row">
      <div class="cat-dot" style="background:${m.color}"></div>
      <div class="cat-name">${m.label}</div>
      <div class="cat-bg"><div class="cat-fill" style="width:${p}%;background:${m.color}"></div></div>
      <div class="cat-meta">${v.done}/${v.total} · ${p}%</div>
    </div>`;
  });

  // Week activity
  const hist=lH();
  const weekDays=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  const today=new Date();
  let weekHTML='';
  for(let i=6;i>=0;i--){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const key=`${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
    const entry=hist.find(h=>h.key===key);
    const pct=entry?Math.round(entry.tasks.filter(t=>t.done).length/entry.tasks.length*100):0;
    const isToday=i===0;
    const color=pct>=80?'var(--green)':pct>=40?'var(--accent)':pct>0?'var(--t3)':'var(--b1)';
    const dow=weekDays[(d.getDay()+6)%7];
    weekHTML+=`<div class="week-bar-col">
      <div class="week-bar-bg" style="position:relative">
        <div class="week-bar-fill" style="height:${Math.max(4,pct)}%;background:${color};min-height:4px"></div>
      </div>
      <div class="week-bar-lbl" style="color:${isToday?'var(--a2)':'var(--t3)'}">${dow}</div>
    </div>`;
  }

  // Streak
  let streak=0;
  const cur=new Date();
  while(true){
    const key=`${cur.getFullYear()}-${cur.getMonth()+1}-${cur.getDate()}`;
    const entry=hist.find(h=>h.key===key);
    const todayCheck=cur.toDateString()===today.toDateString();
    if(entry&&entry.tasks.filter(t=>t.done).length>0){streak++;cur.setDate(cur.getDate()-1);}
    else if(todayCheck){cur.setDate(cur.getDate()-1);}
    else break;
    if(streak>365)break;
  }

  // Quote
  const q=QUOTES[today.getDate()%QUOTES.length];

  // Countdown
  const hl=hoursLeft();
  const cdPct=dayPct();
  const cdOffset=Math.round(245*(1-cdPct/100));

  sb.innerHTML=`
    <!-- PROGRESS -->
    <div class="rb">
      <div class="rb-title">Прогресс дня</div>
      <div class="pi">
        <div class="pi-meta"><span class="pi-name">Задачи</span><span class="pi-val" id="pp-tasks">${s.pct}%</span></div>
        <div class="pi-bg" style="height:16px"><div class="pi-fill" id="pf-tasks" style="width:${s.pct}%;height:16px;background:linear-gradient(90deg,var(--accent),var(--a2))"></div></div>
      </div>
      <div class="pi">
        <div class="pi-meta"><span class="pi-name">Время дня</span><span class="pi-val">${tp}%</span></div>
        <div class="pi-bg" style="height:12px"><div class="pi-fill" id="pf-time" style="width:${tp}%;height:12px;background:linear-gradient(90deg,#ef4444,#f97316)"></div></div>
      </div>
      <div class="pi" style="margin-bottom:0">
        <div class="pi-meta"><span class="pi-name">Продуктивных минут</span><span class="pi-val" style="color:var(--study)">${dH}ч ${dM}м / ${tH}ч</span></div>
        <div class="pi-bg" style="height:12px"><div class="pi-fill" id="pf-min" style="width:${s.totalMin?Math.round(s.doneMin/s.totalMin*100):0}%;height:12px;background:var(--study)"></div></div>
      </div>
    </div>

    <!-- CATEGORIES -->
    <div class="rb">
      <div class="rb-title">По категориям</div>
      ${catRows}
    </div>

    <!-- DOUGHNUT -->
    <div class="rb">
      <div class="rb-title">Распределение</div>
      <div class="chart-row">
        <div class="chart-wrap"><canvas id="dnt"></canvas>
          <div class="chart-center"><div class="chart-pct" id="cpct">${s.pct}%</div><div class="chart-sub">ГОТОВО</div></div>
        </div>
        <div class="chart-legend">
          ${Object.entries(CAT).map(([k,m])=>{const v=cs[k]||{total:0,done:0};return`<div class="leg-item"><div class="leg-left"><div class="leg-dot" style="background:${m.color}"></div><span>${m.label}</span></div><span class="leg-val">${v.done}/${v.total}</span></div>`;}).join('')}
        </div>
      </div>
    </div>

    <!-- MINI STATS -->
    <div class="rb">
      <div class="rb-title">Детали</div>
      <div class="mini-grid">
        <div class="mini-card"><div class="mini-val" id="ms-done">${s.done}</div><div class="mini-lbl">ЗАДАЧ ГОТОВО</div></div>
        <div class="mini-card"><div class="mini-val">${dH}ч ${dM}м</div><div class="mini-lbl">ПРОДУКТИВНОСТЬ</div></div>
        <div class="mini-card"><div class="mini-val" style="color:var(--red)">${s.missed}</div><div class="mini-lbl">ПРОПУЩЕНО</div></div>
        <div class="mini-card"><div class="mini-val" style="color:var(--study)">${(cs.study||{done:0}).done}</div><div class="mini-lbl">УЧЁБА ГОТОВА</div></div>
      </div>
    </div>

    <!-- STREAK + WEEK -->
    <div class="rb">
      <div class="rb-title">Серия и активность</div>
      <div class="streak-row" style="margin-bottom:16px">
        <div class="streak-num">${streak}</div>
        <div class="streak-info">
          <div class="streak-lbl">🔥 дней подряд</div>
          <div class="streak-sub">Не прерывай серию!</div>
        </div>
      </div>
      <div class="week-bars" id="week-bars">${weekHTML}</div>
    </div>

    <!-- COUNTDOWN -->
    <div class="rb">
      <div class="rb-title">До конца дня</div>
      <div class="countdown-row">
        <div class="cd-left">
          <div class="cd-num">${hl}</div>
          <div class="cd-lbl">ЧАСОВ ОСТАЛОСЬ</div>
        </div>
        <div class="cd-ring-wrap">
          <svg width="90" height="90" viewBox="0 0 90 90">
            <circle fill="none" stroke="var(--b1)" stroke-width="7" cx="45" cy="45" r="38"/>
            <circle fill="none" stroke="var(--accent)" stroke-width="7" stroke-linecap="round"
              cx="45" cy="45" r="38" stroke-dasharray="238.76"
              stroke-dashoffset="${Math.round(238.76*(1-cdPct/100))}"
              id="cd-ring" style="transform:rotate(-90deg);transform-origin:45px 45px;transition:stroke-dashoffset .5s"/>
          </svg>
          <div class="cd-pct-txt" id="cd-pct">${tp}%</div>
        </div>
      </div>
    </div>

    <!-- QUOTE -->
    <div class="rb" style="border-bottom:none">
      <div class="rb-title">Мысль дня</div>
      <div class="quote-block">
        <div class="quote-text">${q.t}</div>
        <div class="quote-author">— ${q.a}</div>
      </div>
    </div>
  `;
  buildChart(s,cs);
}

function buildChart(s,cs){
  const c=document.getElementById('dnt');if(!c)return;
  if(chartInst){chartInst.destroy();chartInst=null;}
  const labels=Object.keys(CAT);
  const data=labels.map(k=>(cs[k]||{done:0}).done);
  const colors=labels.map(k=>CAT[k].color);
  const hasData=data.some(v=>v>0);
  chartInst=new Chart(c,{
    type:'doughnut',
    data:{labels:labels.map(k=>CAT[k].label),datasets:[{data:hasData?data:[1],backgroundColor:hasData?colors:['#252535'],borderWidth:0,hoverOffset:6}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'68%',plugins:{legend:{display:false},tooltip:{enabled:hasData}}}
  });
}

  byId('lh-done-txt',`выполнено ${s.done} из ${s.total}`);

function patchSidebar(){
  const s=getStats(),cs=getCS();
  const byId=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  byId('cpct',s.pct+'%');byId('ms-done',s.done);byId('pp-tasks',s.pct+'%');
  const pf=id=>document.getElementById(id);
  if(pf('pf-tasks'))pf('pf-tasks').style.width=s.pct+'%';
  if(pf('pf-time'))pf('pf-time').style.width=timePct()+'%';
  if(pf('pf-min'))pf('pf-min').style.width=(s.totalMin?Math.round(s.doneMin/s.totalMin*100):0)+'%';
  document.querySelectorAll('.cat-fill').forEach((el,i)=>{
    const k=Object.keys(CAT)[i];const v=cs[k]||{total:0,done:0};
    const p=v.total?Math.round(v.done/v.total*100):0;
    el.style.width=p+'%';
  });
  document.querySelectorAll('.cat-meta').forEach((el,i)=>{
    const k=Object.keys(CAT)[i];const v=cs[k]||{total:0,done:0};
    const p=v.total?Math.round(v.done/v.total*100):0;
    el.textContent=`${v.done}/${v.total} · ${p}%`;
  });
  document.querySelectorAll('.leg-val').forEach((el,i)=>{
    const k=Object.keys(CAT)[i];const v=cs[k]||{total:0,done:0};
    el.textContent=`${v.done}/${v.total}`;
  });
  buildChart(s,cs);
}

function toggleTask(id){
  tasks=tasks.map(t=>t.id===id?{...t,done:!t.done}:t);
  sT(tasks);saveHistEntry();
  updateLeftHeader();patchSidebar();
  document.querySelectorAll('.task-card').forEach(card=>{
    const oc=card.getAttribute('onclick')||'';
    const m=oc.match(/toggleTask\((\d+)\)/);if(!m)return;
    const t=tasks.find(t=>t.id===+m[1]);if(!t)return;
    const cb=card.querySelector('.cb');
    if(t.done){card.classList.add('done');if(cb)cb.classList.add('on');}
    else{card.classList.remove('done');if(cb)cb.classList.remove('on');}
  });
  const s=getStats();
  if(s.done===s.total&&s.total>0&&!confDone)launchConfetti();
}

function saveHistEntry(){
  const key=todayKey();const hist=lH();
  const now=new Date();
  const label=now.toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const existing=hist.findIndex(h=>h.key===key);
  const entry={key,label,tasks:tasks.map(t=>({id:t.id,name:t.name,cat:t.cat,time:t.time,done:t.done}))};
  if(existing>=0)hist[existing]=entry;else hist.unshift(entry);
  sH(hist.slice(0,30));
}

function resetDay(){
  saveHistEntry();
  tasks=INIT_TASKS.map(t=>({...t,done:false}));
  sT(tasks);confDone=false;
  renderTimeline();renderSidebar();updateLeftHeader();
}

      return`<div class="hist-task-row">
        <div class="hist-task-dot" style="background:${m.color}"></div>

        <div class="${t.done?'hist-done-y':'hist-done-n'}">${t.done?'✓':'—'}</div>

    }).join('');
    return`<div class="hist-day">
      <div class="hist-day-hd" onclick="toggleHD(${idx})">
        <div class="hist-day-date">${day.label}</div>
        <div class="hist-day-meta">

        </div>
      </div>
      <div class="hist-tasks" id="hd-${idx}">${tHTML}</div>
    </div>`;

}
