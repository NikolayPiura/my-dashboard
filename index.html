<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дашборд</title>
<script src="tasks.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Unbounded:wght@400;700;800&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07070c;--s1:#0f0f18;--s2:#141420;--s3:#1a1a28;
  --b1:#2a2a40;--b2:#363650;
  --accent:#7c5cfc;--a2:#a78bfa;
  --text:#e8e8f4;--t2:#8888a8;--t3:#4a4a68;
  --work:#3b82f6;--health:#22c55e;--personal:#f59e0b;
  --focus:#ec4899;--study:#06b6d4;--sport:#f97316;
  --red:#ef4444;--green:#22c55e;
  --mono:'JetBrains Mono',monospace;
  --title:'Unbounded',sans-serif;
  --sans:'Golos Text',sans-serif;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans)}
.app{display:grid;grid-template-columns:1fr 1fr;width:100vw;height:100vh}

/* ══ ЛЕВАЯ ══ */
.left{display:flex;flex-direction:column;height:100vh;border-right:2px solid var(--b1);overflow:hidden}

/* ВЕРХНИЙ БЛОК — помодоро + часы + дата */
.ltop{
  flex:0 0 22%;
  display:grid;
  grid-template-columns:1fr 1fr;
  border-bottom:2px solid var(--b1);
}

/* Помодоро — левая половина верхнего блока */
.pomo{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;padding:24px 20px;
  border-right:2px solid var(--b1);
  background:var(--s1);
}
.pomo-ring{position:relative;width:120px;height:120px}
.pomo-ring svg{transform:rotate(-90deg);width:120px;height:120px}
.pomo-track{fill:none;stroke:var(--b1);stroke-width:8}
.pomo-fill{fill:none;stroke:var(--accent);stroke-width:8;stroke-linecap:round;stroke-dasharray:339.3;stroke-dashoffset:0;transition:stroke-dashoffset .5s,stroke .3s}
.pomo-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.pomo-time{font-family:var(--mono);font-size:28px;font-weight:700;color:var(--text);line-height:1}
.pomo-label{font-family:var(--mono);font-size:10px;color:var(--t3);letter-spacing:1px}
.pomo-btns{display:flex;gap:12px}
.pomo-btn{font-family:var(--mono);font-size:12px;background:var(--s3);border:1.5px solid var(--b2);color:var(--t2);padding:8px 18px;border-radius:8px;cursor:pointer;transition:all .2s;letter-spacing:.5px}
.pomo-btn:hover{border-color:var(--accent);color:var(--a2)}
.pomo-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.pomo-rounds{font-family:var(--mono);font-size:11px;color:var(--t3);letter-spacing:1px}

/* Часы + дата — правая половина верхнего блока */
.clock-block{
  display:flex;flex-direction:column;justify-content:center;
  padding:24px 28px;background:var(--s1);gap:14px;
}
.clock{font-family:var(--mono);font-size:52px;font-weight:700;letter-spacing:5px;color:var(--text);line-height:1}
.date-day{font-family:var(--title);font-size:18px;font-weight:700;color:var(--t2)}
.date-num{font-family:var(--title);font-size:24px;font-weight:800;color:var(--text)}

/* СРЕДНИЙ БЛОК — выполнено + карточки */
.lmid{
  flex:0 0 26%;
  padding:28px 36px;
  background:var(--s1);
  border-bottom:2px solid var(--b1);
  display:flex;flex-direction:column;justify-content:space-between;gap:20px;
}
.done-row{display:flex;align-items:center;gap:18px}
.done-txt{font-family:var(--title);font-size:26px;font-weight:800;color:var(--text);white-space:nowrap}
.done-pct{font-family:var(--mono);font-size:26px;font-weight:700;color:var(--a2);white-space:nowrap}
.bar-wrap{flex:1;height:14px;background:var(--b1);border-radius:7px;overflow:hidden}
.bar-fill{height:100%;border-radius:7px;background:linear-gradient(90deg,var(--accent),var(--a2));transition:width .5s}
.reset-btn{font-family:var(--mono);font-size:13px;background:transparent;border:1.5px solid var(--b2);color:var(--t2);padding:9px 20px;border-radius:9px;cursor:pointer;flex-shrink:0;transition:all .2s;letter-spacing:.5px}
.reset-btn:hover{border-color:var(--accent);color:var(--a2)}
.cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.card{background:var(--s3);border:1.5px solid var(--b1);border-radius:18px;padding:24px 16px;text-align:center}
.card-val{font-family:var(--title);font-size:72px;font-weight:800;line-height:1;margin-bottom:10px}
.card-lbl{font-size:13px;color:var(--t2);letter-spacing:1px;font-family:var(--mono)}
.card.g .card-val{color:var(--green)}
.card.b .card-val{color:var(--work)}
.card.r .card-val{color:var(--red)}

/* ЗАДАЧИ */
.tasks{flex:1;overflow-y:auto;padding:18px 20px;scrollbar-width:thin;scrollbar-color:var(--b2) transparent}
.tasks::-webkit-scrollbar{width:4px}
.tasks::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
.task{display:flex;align-items:center;gap:14px;background:var(--s2);border:1.5px solid var(--b1);border-radius:14px;padding:20px 18px;margin-bottom:10px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.task::before{content:'';position:absolute;left:0;top:0;bottom:0;width:5px}
.task.cat-work::before{background:var(--work)}
.task.cat-health::before{background:var(--health)}
.task.cat-personal::before{background:var(--personal)}
.task.cat-focus::before{background:var(--focus)}
.task.cat-study::before{background:var(--study)}
.task.cat-sport::before{background:var(--sport)}
.task:hover{border-color:var(--b2);background:var(--s3);transform:translateX(5px)}
.task.done{background:var(--s1);border-color:var(--b1)}
.task.done .tname{text-decoration:line-through;color:var(--t2)}
.task.done .ttime,.task.done .tdur{color:var(--t3)}
.task.done .ttag{opacity:.35}
.task.tnow{border-color:var(--accent)}
.task.missed:not(.done){border-color:#ef444428}
.cb{width:26px;height:26px;border-radius:7px;border:2px solid var(--b2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.cb.on{background:var(--accent);border-color:var(--accent)}
.cb.on::after{content:'✓';font-size:15px;color:#fff;font-weight:700}
.ttime{font-family:var(--mono);font-size:14px;color:var(--t3);flex-shrink:0;min-width:48px}
.tname{font-size:18px;flex:1;line-height:1.3;font-weight:500}
.tdur{font-size:13px;color:var(--t3);font-family:var(--mono);flex-shrink:0}
.ttag{font-size:13px;padding:5px 12px;border-radius:7px;font-weight:600;flex-shrink:0}
.tag-work{background:#1a3050;color:#60a5fa}
.tag-health{background:#0f3020;color:#4ade80}
.tag-personal{background:#382008;color:#fbbf24}
.tag-focus{background:#400a25;color:#f9a8d4}
.tag-study{background:#052535;color:#67e8f9}
.tag-sport{background:#38200a;color:#fb923c}
.nowbar{display:flex;align-items:center;gap:12px;margin:8px 0;padding:11px 16px;background:#ef444412;border:1.5px solid #ef444440;border-radius:11px}
.nowdot{width:13px;height:13px;border-radius:50%;background:var(--red);box-shadow:0 0 12px var(--red);flex-shrink:0;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.nowt{font-family:var(--mono);font-size:14px;color:var(--red);font-weight:700}
.nowsep{font-size:13px;color:var(--t3)}

/* ══ ПРАВАЯ — 4 равные секции ══ */
.right{display:grid;grid-template-rows:1fr 1fr 1fr 1fr;height:100vh;overflow:hidden;background:var(--s1)}
.rb{display:flex;flex-direction:column;padding:32px 40px;border-bottom:2px solid var(--b1);overflow:hidden}
.rb:last-child{border-bottom:none}
.rb-title{font-family:var(--mono);font-size:12px;letter-spacing:2.5px;color:var(--t3);text-transform:uppercase;margin-bottom:24px;flex-shrink:0}

/* Прогресс */
.prog{display:flex;flex-direction:column;justify-content:space-between;flex:1}
.prog-item{flex:1;display:flex;flex-direction:column;justify-content:center}
.prog-meta{display:flex;justify-content:space-between;margin-bottom:12px}
.prog-name{font-size:20px;color:var(--t2);font-weight:500}
.prog-val{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--a2)}
.prog-bg{background:var(--s3);border-radius:11px;overflow:hidden}
.prog-fill{border-radius:11px;transition:width .6s cubic-bezier(.4,0,.2,1)}

/* Категории */
.cats{display:flex;flex-direction:column;justify-content:space-between;flex:1}
.cat{display:flex;align-items:center;gap:16px}
.cat-dot{width:15px;height:15px;border-radius:50%;flex-shrink:0}
.cat-name{font-size:19px;color:var(--t2);width:106px;flex-shrink:0;font-weight:500}
.cat-bg{flex:1;background:var(--s3);border-radius:8px;height:15px;overflow:hidden}
.cat-fill{height:100%;border-radius:8px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.cat-meta{font-family:var(--mono);font-size:15px;color:var(--t3);width:95px;text-align:right;flex-shrink:0}

/* Диаграмма */
.chart-section{display:flex;align-items:center;gap:32px;flex:1;min-height:0}
.chart-wrap{position:relative;width:180px;height:180px;flex-shrink:0}
.chart-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
.chart-pct{font-family:var(--title);font-size:36px;font-weight:800;color:var(--a2)}
.chart-sub{font-size:12px;color:var(--t3);letter-spacing:1px;margin-top:4px;font-family:var(--mono)}
.legend{display:flex;flex-direction:column;justify-content:space-between;flex:1;height:100%}
.leg-item{display:flex;align-items:center;justify-content:space-between;font-size:16px;color:var(--t2);background:var(--s3);border:1.5px solid var(--b1);border-radius:11px;padding:11px 16px}
.leg-left{display:flex;align-items:center;gap:11px}
.leg-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.leg-val{font-family:var(--mono);font-size:15px;color:var(--a2);font-weight:700}

/* Активность + цитата */
.last-section{display:grid;grid-template-columns:1fr 1fr;gap:22px;flex:1;min-height:0}
.act-block{display:flex;flex-direction:column}
.act-sub{font-family:var(--mono);font-size:11px;letter-spacing:2px;color:var(--t3);text-transform:uppercase;margin-bottom:10px}
.act-bars{display:flex;align-items:flex-end;gap:10px;flex:1}
.act-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%}
.act-bar{width:100%;border-radius:8px 8px 0 0;min-height:5px;transition:height .4s}
.act-lbl{font-size:13px;color:var(--t3);font-family:var(--mono)}
.quote-block{background:var(--s3);border:1.5px solid var(--b1);border-left:5px solid var(--accent);border-radius:0 18px 18px 0;padding:22px 24px;display:flex;flex-direction:column;justify-content:center}
.quote-text{font-size:17px;color:var(--text);line-height:1.65;font-style:italic}
.quote-auth{font-size:13px;color:var(--t3);margin-top:10px;font-family:var(--mono)}

.conf{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.cp{position:absolute;border-radius:2px;animation:cpfall linear forwards}
@keyframes cpfall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<div class="app">

  <!-- ЛЕВАЯ -->
  <div class="left">

    <!-- ВЕРХ: помодоро + часы -->
    <div class="ltop">
      <div class="pomo">
        <div class="pomo-ring">
          <svg viewBox="0 0 120 120">
            <circle class="pomo-track" cx="60" cy="60" r="54"/>
            <circle class="pomo-fill" id="pomo-ring" cx="60" cy="60" r="54"/>
          </svg>
          <div class="pomo-center">
            <div class="pomo-time" id="pomo-time">25:00</div>
            <div class="pomo-label" id="pomo-label">ФОКУС</div>
          </div>
        </div>
        <div class="pomo-btns">
          <button class="pomo-btn active" id="pomo-start" onclick="pomoToggle()">СТАРТ</button>
          <button class="pomo-btn" onclick="pomoReset()">СБРОС</button>
        </div>
        <div class="pomo-rounds" id="pomo-rounds">🍅 0 помодоро</div>
      </div>

      <div class="clock-block">
        <div class="clock" id="clock">00:00:00</div>
        <div>
          <div class="date-day" id="date-day">суббота</div>
          <div class="date-num" id="date-num">28 марта</div>
        </div>
      </div>
    </div>

    <!-- СЕРЕДИНА: выполнено + карточки -->
    <div class="lmid">
      <div class="done-row">
        <span class="done-txt" id="done-txt">выполнено 0 из 15</span>
        <div class="bar-wrap"><div class="bar-fill" id="bar" style="width:0%"></div></div>
        <span class="done-pct" id="done-pct">0%</span>
        <button class="reset-btn" onclick="resetDay()">СБРОС</button>
      </div>
      <div class="cards">
        <div class="card g"><div class="card-val" id="s-done">0</div><div class="card-lbl">ГОТОВО</div></div>
        <div class="card b"><div class="card-val" id="s-rem">0</div><div class="card-lbl">ОСТАЛОСЬ</div></div>
        <div class="card r"><div class="card-val" id="s-miss">0</div><div class="card-lbl">ПРОПУЩЕНО</div></div>
      </div>
    </div>

    <!-- ЗАДАЧИ -->
    <div class="tasks" id="tasks"></div>
  </div>

  <!-- ПРАВАЯ -->
  <div class="right">

    <div class="rb">
      <div class="rb-title">Прогресс дня</div>
      <div class="prog">
        <div class="prog-item">
          <div class="prog-meta"><span class="prog-name">Задачи</span><span class="prog-val" id="pp">0%</span></div>
          <div class="prog-bg" style="height:26px"><div class="prog-fill" id="pf-t" style="width:0%;height:26px;background:linear-gradient(90deg,var(--accent),var(--a2))"></div></div>
        </div>
        <div class="prog-item">
          <div class="prog-meta"><span class="prog-name">Время дня</span><span class="prog-val" id="pv-d">0%</span></div>
          <div class="prog-bg" style="height:20px"><div class="prog-fill" id="pf-d" style="width:0%;height:20px;background:linear-gradient(90deg,#ef4444,#f97316)"></div></div>
        </div>
        <div class="prog-item">
          <div class="prog-meta"><span class="prog-name">Продуктивных минут</span><span class="prog-val" id="pv-m" style="color:var(--study)">0ч / 0ч</span></div>
          <div class="prog-bg" style="height:20px"><div class="prog-fill" id="pf-m" style="width:0%;height:20px;background:var(--study)"></div></div>
        </div>
      </div>
    </div>

    <div class="rb">
      <div class="rb-title">По категориям</div>
      <div class="cats" id="cats"></div>
    </div>

    <div class="rb">
      <div class="rb-title">Распределение</div>
      <div class="chart-section">
        <div class="chart-wrap">
          <canvas id="dnt"></canvas>
          <div class="chart-center">
            <div class="chart-pct" id="cpct">0%</div>
            <div class="chart-sub">ГОТОВО</div>
          </div>
        </div>
        <div class="legend" id="legend"></div>
      </div>
    </div>

    <div class="rb">
      <div class="rb-title">Активность и мотивация</div>
      <div class="last-section">
        <div class="act-block">
          <div class="act-sub">7 дней</div>
          <div class="act-bars" id="act-bars"></div>
        </div>
        <div class="quote-block">
          <div class="quote-text" id="qt"></div>
          <div class="quote-auth" id="qa"></div>
        </div>
      </div>
    </div>

  </div>
</div>
<div class="conf" id="conf"></div>

<script>
/* ══ ПОМОДОРО ══ */
const POMO_WORK=25*60, POMO_BREAK=5*60;
let pomoSec=POMO_WORK, pomoRunning=false, pomoInterval=null;
let pomoIsBreak=false, pomoRounds=0;

function pomoFmt(s){return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`}

function pomoTick(){
  pomoSec--;
  if(pomoSec<0){
    if(!pomoIsBreak){pomoRounds++;pomoIsBreak=true;pomoSec=POMO_BREAK;}
    else{pomoIsBreak=false;pomoSec=POMO_WORK;}
  }
  pomoRender();
}

function pomoRender(){
  const total=pomoIsBreak?POMO_BREAK:POMO_WORK;
  const pct=pomoSec/total;
  const circ=2*Math.PI*54;
  document.getElementById('pomo-time').textContent=pomoFmt(pomoSec);
  document.getElementById('pomo-label').textContent=pomoIsBreak?'ПЕРЕРЫВ':'ФОКУС';
  document.getElementById('pomo-rounds').textContent=`🍅 ${pomoRounds} помодоро`;
  const ring=document.getElementById('pomo-ring');
  ring.style.strokeDashoffset=circ*(1-pct);
  ring.style.stroke=pomoIsBreak?'var(--green)':'var(--accent)';
}

function pomoToggle(){
  const btn=document.getElementById('pomo-start');
  if(pomoRunning){
    clearInterval(pomoInterval);pomoRunning=false;
    btn.textContent='СТАРТ';btn.classList.remove('active');
  } else {
    pomoInterval=setInterval(pomoTick,1000);pomoRunning=true;
    btn.textContent='ПАУЗА';btn.classList.add('active');
  }
}

function pomoReset(){
  clearInterval(pomoInterval);pomoRunning=false;
  pomoSec=POMO_WORK;pomoIsBreak=false;
  const btn=document.getElementById('pomo-start');
  btn.textContent='СТАРТ';btn.classList.remove('active');
  pomoRender();
}

/* ══ ДАННЫЕ ══ */
const SAVE='dash_v9',HSAVE='dash_hist_v1';
const CAT={
  work:{label:'Работа',color:'#3b82f6'},
  health:{label:'Здоровье',color:'#22c55e'},
  personal:{label:'Личное',color:'#f59e0b'},
  focus:{label:'Фокус',color:'#ec4899'},
  study:{label:'Учёба',color:'#06b6d4'},
  sport:{label:'Спорт',color:'#f97316'},
};
const TAGS={work:'tag-work',health:'tag-health',personal:'tag-personal',focus:'tag-focus',study:'tag-study',sport:'tag-sport'};
const QQ=[
  {t:'Дисциплина — это мост между целями и достижениями.',a:'Джим Рон'},
  {t:'Успех — это сумма небольших усилий, повторяемых изо дня в день.',a:'Роберт Кольер'},
  {t:'Не жди. Время никогда не будет «подходящим».',a:'Наполеон Хилл'},
  {t:'Единственный способ делать великую работу — любить то, что делаешь.',a:'Стив Джобс'},
  {t:'Каждое утро — это новый шанс изменить свою жизнь.',a:'неизвестно'},
  {t:'Твои привычки определяют твою судьбу.',a:'неизвестно'},
  {t:'Сделай сегодня то, что другие не хотят — и завтра будешь жить иначе.',a:'неизвестно'},
];
const INIT=(typeof TODAY_TASKS!=='undefined'?TODAY_TASKS:[]).map((t,i)=>({...t,id:i+1,done:false}));
function loadT(){try{const s=localStorage.getItem(SAVE);if(s){const sv=JSON.parse(s);return INIT.map(t=>{const f=sv.find(x=>x.time===t.time&&x.name===t.name);return f?{...t,done:f.done}:t;});}}catch(e){}return INIT.map(t=>({...t}));}
function saveT(t){try{localStorage.setItem(SAVE,JSON.stringify(t));}catch(e){}}
function loadH(){try{const s=localStorage.getItem(HSAVE);if(s)return JSON.parse(s);}catch(e){}return [];}
function saveH(h){try{localStorage.setItem(HSAVE,JSON.stringify(h));}catch(e){}}

let tasks=loadT(),ch=null,confDone=false;
const toMin=t=>{const[h,m]=t.split(':').map(Number);return h*60+m;};
const nowMin=()=>{const n=new Date();return n.getHours()*60+n.getMinutes();};
const fmtT=d=>d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
const fmtNow=()=>new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
const todayKey=()=>{const d=new Date();return`${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;};

function getStats(){
  const total=tasks.length,done=tasks.filter(t=>t.done).length;
  const nm=nowMin();
  const missed=tasks.filter(t=>!t.done&&toMin(t.time)<nm).length;
  const pct=total?Math.round(done/total*100):0;
  const totalMin=tasks.reduce((a,t)=>a+(t.dur||0),0);
  const doneMin=tasks.filter(t=>t.done).reduce((a,t)=>a+(t.dur||0),0);
  return{total,done,missed,remaining:total-done-missed,pct,totalMin,doneMin};
}
function getCS(){const r={};tasks.forEach(t=>{if(!r[t.cat])r[t.cat]={total:0,done:0};r[t.cat].total++;if(t.done)r[t.cat].done++;});return r;}
function timePct(){const S=6*60,E=23*60,nm=nowMin();if(nm<=S)return 0;if(nm>=E)return 100;return Math.round((nm-S)/(E-S)*100);}

function renderTasks(){
  const el=document.getElementById('tasks');if(!el)return;
  const nm=nowMin();let html='',nd=false;
  tasks.forEach((t,i)=>{
    const tMin=toMin(t.time),nextMin=tasks[i+1]?toMin(tasks[i+1].time):Infinity;
    if(!nd&&((tMin<=nm&&nm<nextMin)||(i===0&&nm<tMin))){nd=true;html+=`<div class="nowbar"><div class="nowdot"></div><div class="nowt" id="nowt">${fmtNow()}</div><div class="nowsep">— сейчас</div></div>`;}
    const missed=!t.done&&tMin<nm,curr=tMin<=nm&&nm<tMin+(t.dur||30);
    html+=`<div class="task cat-${t.cat}${t.done?' done':''}${missed?' missed':''}${curr&&!t.done?' tnow':''}" onclick="toggle(${t.id})">
      <div class="cb${t.done?' on':''}"></div>
      <div class="ttime">${t.time}</div>
      <div class="tname">${t.name}</div>
      ${t.dur?`<div class="tdur">${t.dur}м</div>`:''}
      <div class="ttag ${TAGS[t.cat]||''}">${(CAT[t.cat]||{label:''}).label}</div>
    </div>`;
  });
  if(!nd)html=`<div class="nowbar"><div class="nowdot"></div><div class="nowt" id="nowt">${fmtNow()}</div><div class="nowsep">— сейчас</div></div>`+html;
  el.innerHTML=html;
  setTimeout(()=>{const nb=el.querySelector('.nowbar');if(nb)nb.scrollIntoView({block:'center',behavior:'smooth'});},100);
}

function updateUI(){
  const s=getStats(),cs=getCS(),tp=timePct();
  const dH=Math.floor(s.doneMin/60),dM=s.doneMin%60,tH=Math.floor(s.totalMin/60);
  const set=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  const setW=(id,w)=>{const e=document.getElementById(id);if(e)e.style.width=w+'%';};
  set('done-txt',`выполнено ${s.done} из ${s.total}`);set('done-pct',s.pct+'%');
  set('s-done',s.done);set('s-rem',s.remaining);set('s-miss',s.missed);
  set('pp',s.pct+'%');set('pv-d',tp+'%');set('pv-m',`${dH}ч ${dM}м / ${tH}ч`);set('cpct',s.pct+'%');
  setW('bar',s.pct);setW('pf-t',s.pct);setW('pf-d',tp);setW('pf-m',s.totalMin?Math.round(s.doneMin/s.totalMin*100):0);

  const cEl=document.getElementById('cats');
  if(cEl){cEl.innerHTML=Object.entries(CAT).map(([k,m])=>{const v=cs[k]||{total:0,done:0};const p=v.total?Math.round(v.done/v.total*100):0;return`<div class="cat"><div class="cat-dot" style="background:${m.color}"></div><div class="cat-name">${m.label}</div><div class="cat-bg"><div class="cat-fill" style="width:${p}%;background:${m.color}"></div></div><div class="cat-meta">${v.done}/${v.total} · ${p}%</div></div>`;}).join('');}

  const lEl=document.getElementById('legend');
  if(lEl){lEl.innerHTML=Object.entries(CAT).map(([k,m])=>{const v=cs[k]||{total:0,done:0};return`<div class="leg-item"><div class="leg-left"><div class="leg-dot" style="background:${m.color}"></div><span>${m.label}</span></div><span class="leg-val">${v.done}/${v.total}</span></div>`;}).join('');}

  buildChart(s,cs);renderAct();
}

function buildChart(s,cs){
  const c=document.getElementById('dnt');if(!c)return;
  if(ch){ch.destroy();ch=null;}
  const keys=Object.keys(CAT),data=keys.map(k=>(cs[k]||{done:0}).done),colors=keys.map(k=>CAT[k].color),has=data.some(v=>v>0);
  ch=new Chart(c,{type:'doughnut',data:{labels:keys.map(k=>CAT[k].label),datasets:[{data:has?data:[1],backgroundColor:has?colors:['#252535'],borderWidth:0,hoverOffset:8}]},options:{responsive:true,maintainAspectRatio:false,cutout:'68%',plugins:{legend:{display:false},tooltip:{enabled:has}}}});
}

function renderAct(){
  const el=document.getElementById('act-bars');if(!el)return;
  const hist=loadH();const dn=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];let html='';
  for(let i=6;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const key=`${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
    const entry=hist.find(h=>h.key===key);
    const tot=entry?entry.tasks.length:tasks.length||15,done=entry?entry.tasks.filter(t=>t.done).length:0;
    const pct=tot?Math.round(done/tot*100):0,hPx=Math.max(5,Math.round(pct/100*100));
    const isToday=i===0,col=isToday?'var(--accent)':pct>0?'var(--a2)66':'var(--b1)';
    html+=`<div class="act-col"><div class="act-bar" style="height:${hPx}px;background:${col}" title="${pct}%"></div><div class="act-lbl" style="color:${isToday?'var(--a2)':'var(--t3)'}">${dn[d.getDay()]}</div></div>`;
  }
  el.innerHTML=html;
}

function patchCards(){
  document.querySelectorAll('.task').forEach(card=>{
    const oc=card.getAttribute('onclick')||'';const m=oc.match(/toggle\((\d+)\)/);if(!m)return;
    const t=tasks.find(t=>t.id===+m[1]);if(!t)return;
    const cb=card.querySelector('.cb');
    if(t.done){card.classList.add('done');if(cb)cb.classList.add('on');}
    else{card.classList.remove('done');if(cb)cb.classList.remove('on');}
  });
}

function toggle(id){
  tasks=tasks.map(t=>t.id===id?{...t,done:!t.done}:t);
  saveT(tasks);saveHist2();patchCards();updateUI();
  const s=getStats();if(s.done===s.total&&s.total>0&&!confDone)launchConfetti();
}

function saveHist2(){
  const key=todayKey(),hist=loadH();
  const label=new Date().toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const ex=hist.findIndex(h=>h.key===key);
  const entry={key,label,tasks:tasks.map(t=>({id:t.id,name:t.name,cat:t.cat,time:t.time,done:t.done}))};
  if(ex>=0)hist[ex]=entry;else hist.unshift(entry);saveH(hist.slice(0,30));
}

function resetDay(){saveHist2();tasks=INIT.map(t=>({...t,done:false}));saveT(tasks);confDone=false;renderTasks();updateUI();}

function launchConfetti(){
  confDone=true;const layer=document.getElementById('conf');if(!layer)return;
  const cols=['#a78bfa','#60a5fa','#34d399','#f59e0b','#f87171','#c084fc','#fb923c'];
  for(let i=0;i<130;i++){setTimeout(()=>{const el=document.createElement('div');el.className='cp';el.style.cssText=`left:${Math.random()*100}%;background:${cols[~~(Math.random()*cols.length)]};width:${8+Math.random()*10}px;height:${8+Math.random()*10}px;animation-duration:${2+Math.random()*2.5}s;animation-delay:${Math.random()*.5}s`;layer.appendChild(el);setTimeout(()=>el.remove(),5000);},i*20);}
}

function tick(){
  const now=new Date();
  const cl=document.getElementById('clock');if(cl)cl.textContent=fmtT(now);
  const nt=document.getElementById('nowt');if(nt)nt.textContent=fmtNow();
  const tp=timePct();
  const pfd=document.getElementById('pf-d');if(pfd)pfd.style.width=tp+'%';
  const pvd=document.getElementById('pv-d');if(pvd)pvd.textContent=tp+'%';
}

/* INIT */
const nowD=new Date();
const dd=document.getElementById('date-day');if(dd)dd.textContent=nowD.toLocaleDateString('ru-RU',{weekday:'long'});
const dn2=document.getElementById('date-num');if(dn2)dn2.textContent=nowD.toLocaleDateString('ru-RU',{day:'numeric',month:'long'});
const q=QQ[nowD.getDay()%QQ.length];
const qte=document.getElementById('qt');if(qte)qte.textContent=q.t;
const qae=document.getElementById('qa');if(qae)qae.textContent='— '+q.a;
pomoRender();
renderTasks();updateUI();
setInterval(tick,1000);
</script>
</body>
</html>
